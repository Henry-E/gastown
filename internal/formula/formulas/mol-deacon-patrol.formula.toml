description = """
Mayor daemon patrol loop.

Keep patrol mechanical and quiet:
- Handle callbacks and infrastructure hygiene.
- Monitor rig health and dispatch recovery work.
- Avoid noisy mail/nudges in idle periods.
- Keep compaction reporting silent unless compaction actually changed data.

Read step instructions before acting (`bd show <step-id>`).
"""
formula = "mol-deacon-patrol"
version = 14

[vars]
[vars.wisp_type]
description = "Type of wisp created for this molecule"
default = "patrol"

[[steps]]
id = "heartbeat"
title = "Refresh heartbeat"
description = """
Refresh liveness at cycle start:
```bash
gt deacon heartbeat "starting patrol cycle"
```
Run this first.
"""

[[steps]]
id = "inbox-check"
title = "Handle callbacks from agents"
needs = ["heartbeat"]
description = """
Cycle pre-clean:
```bash
bd mol wisp gc --closed --force
bd mol wisp gc --age 1h --force
```

Process mailbox:
```bash
gt mail inbox
gt mail read <id>
```

Rules:
- HELP / escalation / lifecycle: handle, then archive.
- DOG_DONE and CONVOY_NEEDS_FEEDING: informational, archive.
- RECOVERED_BEAD <id>: `gt deacon redispatch <id>`, then archive.

Archive processed messages:
```bash
gt mail archive <message-id>
```
"""

[[steps]]
id = "orphan-process-cleanup"
title = "Clean up orphaned claude subagent processes"
needs = ["inbox-check"]
description = """
Best-effort orphan subagent cleanup:
```bash
gt deacon cleanup-orphans
```
Log failures and continue.
"""

[[steps]]
id = "test-pollution-cleanup"
title = "Detect and clean runtime test pollution"
needs = ["inbox-check"]
description = """
Clean dead-process pollution safely (only dead/unowned resources):
```bash
gt dolt kill-imposters 2>/dev/null || true
```

Then clean stale tmp dirs/PID files only when unused/dead; never touch live handles.
Track brief counts for patrol summary.
"""

[[steps]]
id = "gate-evaluation"
title = "Evaluate pending async gates"
needs = ["inbox-check"]
description = """
Evaluate async gates and close ready timer gates:
```bash
bd gate list --json
bd gate close <id> --reason "Timer elapsed"
```
Skip non-timer gates requiring external input.
"""

[[steps]]
id = "dispatch-gated-molecules"
title = "Dispatch molecules with resolved gates"
needs = ["gate-evaluation"]
description = """
Dispatch molecules unblocked by closed gates:
```bash
bd ready --gated --json
bd mol show <mol-id> --json
gt sling <mol-id> <rig>/polecats
```
Skip when none are ready.
"""

[[steps]]
id = "check-convoy-completion"
title = "Check convoy completion"
needs = ["inbox-check"]
description = """
Check and auto-close completed convoys:
```bash
gt convoy list
gt convoy check
```
Deacon does not feed convoys directly.
"""

[[steps]]
id = "resolve-external-deps"
title = "Resolve external dependencies"
needs = ["check-convoy-completion"]
description = """
Verify cross-rig dependency propagation after recent closures:
```bash
gt feed --since 10m --plain | grep "✓"
bd show <closed-issue>
bd blocked
```
No manual dependency rewiring unless data is inconsistent.
"""

[[steps]]
id = "fire-notifications"
title = "Fire notifications"
needs = ["resolve-external-deps"]
description = """
Send only actionable notifications.

Examples:
```bash
gt mail send mayor/ -s "Convoy complete: <convoy-title>" -m "<brief summary>"
gt mail send <rig>/witness -s "Dependency resolved: <issue-id>" -m "<brief impact>"
```
Keep notifications brief; avoid chatter.
"""

[[steps]]
id = "heartbeat-mid"
title = "Mid-cycle heartbeat refresh"
needs = ["orphan-process-cleanup", "test-pollution-cleanup", "dispatch-gated-molecules", "fire-notifications"]
description = """
Refresh liveness during long cycles:
```bash
gt deacon heartbeat "mid-cycle checkpoint"
```
"""

[[steps]]
id = "health-scan"
title = "Check Witness and Refinery health"
needs = ["heartbeat-mid"]
description = """
For each rig:
1. Skip DOCKED/PARKED rigs.
2. Check witness/refinery status.
3. If active work exists, queue HEALTH_CHECK nudges.

Commands:
```bash
gt rig status <rig>
gt witness status <rig>
gt refinery status <rig>
bd list --status=in_progress --limit=5
gt nudge --mode=queue <rig>/witness 'HEALTH_CHECK from deacon'
gt nudge --mode=queue <rig>/refinery 'HEALTH_CHECK from deacon'
```

If components stay unresponsive across cycles, attempt restart then escalate:
```bash
gt witness restart <rig>
gt refinery restart <rig>
gt mail send mayor/ -s "Health: <rig> <component> unresponsive" -m "<context>"
```
"""

[[steps]]
id = "dolt-health"
title = "Run Dolt data-plane health check"
needs = ["health-scan"]
description = """
Run health scan and react to alerts:
```bash
gt health --json
```

Typical reactions:
```bash
gt escalate -s CRITICAL "Dolt server is down"
gt dog dispatch --formula mol-dog-compactor --var db=<db_name>
gt dog dispatch --formula mol-dog-backup
gt dolt kill-imposters
gt dolt cleanup
```
If healthy, log and continue.
"""

[[steps]]
id = "zombie-scan"
title = "Detect zombie polecats (NO KILL AUTHORITY)"
needs = ["dolt-health"]
description = """
Detection only. Never terminate polecats directly.

Run dry-run scan:
```bash
gt deacon zombie-scan --dry-run
```

If zombies detected, file warrants and notify mayor:
```bash
gt warrant file <polecat> --reason "Zombie detected: no session, no hook, idle >10m"
gt mail send mayor/ -s "Witness cleanup failure" -m "Filed warrant for <polecat>"
```
"""

[[steps]]
id = "plugin-run"
title = "Execute registered plugins"
needs = ["zombie-scan"]
description = """
Execute plugins whose gates are open under `$GT_ROOT/plugins/`.
Respect plugin gate config and parallel/sequential execution metadata.
Skip when no plugins exist.
"""

[[steps]]
id = "dog-pool-maintenance"
title = "Maintain dog pool"
needs = ["health-scan"]
description = """
Maintain enough idle dogs for dispatch:
```bash
gt dog status
gt dog add <name>
gt dogs list --json
```
Keep at least one idle dog when feasible.
"""

[[steps]]
id = "dog-health-check"
title = "Check for stuck dogs"
needs = ["dog-pool-maintenance"]
description = """
Check long-running working dogs:
```bash
gt dog list --json
gt dog status <name> --json
```

If stuck beyond timeout, either file warrant or force clear:
```bash
gt warrant file deacon/dogs/<name> --reason "Stuck: <work> for <duration>"
gt dog clear <name> --force
gt mail send deacon/ -s "DOG_TIMEOUT <name>" -m "<details>"
```
Escalate chronic failures to mayor.
"""

[[steps]]
id = "orphan-check"
title = "Detect abandoned work"
needs = ["dog-health-check"]
description = """
Detect only; dispatch recovery work to dogs.

Quick orphan scan:
```bash
bd list --status=in_progress --json | head -20
gt session status <rig>/<name> --json
```

If orphaned work exists, dispatch:
```bash
gt sling mol-orphan-scan deacon/dogs --var scope=town
```
"""

[[steps]]
id = "session-gc"
title = "Detect cleanup needs"
needs = ["orphan-check"]
description = """
Detect cleanup needs (do not fix inline):
```bash
gt doctor -v
```

If cleanup needed, dispatch dog work:
```bash
gt sling mol-session-gc deacon/dogs --var mode=conservative
```
"""

[[steps]]
id = "wisp-compact"
title = "Compact expired wisps"
needs = ["session-gc"]
description = """
Run compaction only when there is real work.

1. Preview:
```bash
gt compact --dry-run --json
```

2. If `promoted + deleted == 0`: skip compaction and stay silent.

3. If `promoted + deleted > 0`: execute and record counts:
```bash
gt compact --verbose
```
"""

[[steps]]
id = "compact-report"
title = "Send compaction digest report"
needs = ["wisp-compact"]
description = """
Compaction reporting must be silent unless compaction changed data.

Re-check compaction scope:
```bash
gt compact --dry-run --json
```

If `promoted + deleted == 0`: skip this step (NO MAIL).

If `promoted + deleted > 0`, send report:
```bash
gt compact report
```

Optional weekly rollup (Monday only, and only if meaningful compaction occurred):
```bash
gt compact report --weekly
```
"""

[[steps]]
id = "costs-digest"
title = "Aggregate daily costs [DISABLED]"
needs = ["compact-report"]
description = """
Disabled. Skip this step.
"""

[[steps]]
id = "patrol-digest"
title = "Aggregate daily patrol digests"
needs = ["costs-digest"]
description = """
Aggregate yesterday's patrol digests:
```bash
gt patrol digest --yesterday --dry-run
gt patrol digest --yesterday
```
Skip if none found.
"""

[[steps]]
id = "log-maintenance"
title = "Rotate logs and prune state"
needs = ["patrol-digest"]
description = """
Maintain daemon runtime files:
```bash
gt daemon rotate-logs
gt daemon status --json 2>/dev/null
```
Prune stale state entries if found.
"""

[[steps]]
id = "patrol-cleanup"
title = "End-of-cycle inbox hygiene"
needs = ["log-maintenance"]
description = """
Final inbox hygiene:
```bash
gt mail inbox
gt mail archive <message-id>
```
Keep only truly unprocessed messages.
"""

[[steps]]
id = "context-check"
title = "Check own context limit"
needs = ["patrol-cleanup"]
description = """
Check context pressure:
```bash
gt context --usage
```
If high, prepare handoff; if low, continue patrol loop.
"""

[[steps]]
id = "loop-or-exit"
title = "Loop or exit for respawn"
needs = ["context-check"]
description = """
If continuing:
```bash
gt mol step await-signal --agent-bead hq-deacon \
  --backoff-base 60s --backoff-mult 2 --backoff-max 5m
gt agent state hq-deacon --set idle=0
gt patrol report --summary "<brief summary>" --steps "<step_id:OK|SKIP,...>"
```

If context is high, hand off and exit:
```bash
gt handoff -s "Deacon patrol handoff" -m "<observations>"
```
Never leave session idle without reporting or handoff.
"""
