description = """
Process merge-ready work from Witness using a strict mechanical flow:
inbox-check -> queue-scan -> process-branch -> run-tests -> handle-failures -> merge-push -> loop-check -> burn-or-loop.

Always read step instructions before acting (`bd show <step-id>`).

Target Resolution Rule:
- If integration_branch_refinery_enabled = "true": use MR target when present, otherwise {{target_branch}}.
- If integration_branch_refinery_enabled = "false": always use {{target_branch}}.

FORBIDDEN:
- Landing integration branches with raw git merge/push commands.
- Writing application code to fix branch failures.
"""
formula = "mol-refinery-patrol"
version = 10

[vars]
[vars.wisp_type]
description = "Type of wisp created for this molecule"
default = "patrol"

[vars.integration_branch_refinery_enabled]
description = "Whether the refinery merges to integration branches (true) or always to target_branch (false)"
default = "true"

[vars.run_tests]
description = "Whether to run tests before merging"
default = "true"

[vars.setup_command]
description = "Setup/install command (e.g., pnpm install). Empty = skip."
default = ""

[vars.typecheck_command]
description = "Type check command (e.g., tsc --noEmit). Empty = skip."
default = ""

[vars.lint_command]
description = "Lint command (e.g., eslint .). Empty = skip."
default = ""

[vars.test_command]
description = "Test command to run (if run_tests is true)"
default = "go test ./..."

[vars.build_command]
description = "Build command (e.g., go build ./...). Empty = skip."
default = ""

[vars.target_branch]
description = "Default target branch for merges"
default = "main"

[vars.delete_merged_branches]
description = "Whether to delete source branches after merge"
default = "true"

[[steps]]
id = "inbox-check"
title = "Check refinery mail"
description = """
Start-of-cycle cleanup:
```bash
bd mol wisp gc --closed --force
bd mol wisp gc --age 1h --force
```

Read inbox:
```bash
gt mail inbox
```

For each message:
- MERGE_READY: record branch, issue, polecat name, MR bead ID, and message ID. Mark read but do not archive yet.
- PATROL wake / HELP / HANDOFF: handle and archive when done.

Use recorded MERGE_READY metadata later in merge-push for notification, post-merge cleanup, and archiving.
"""

[[steps]]
id = "queue-scan"
title = "Scan merge queue"
needs = ["inbox-check"]
description = """
Fetch and list MQ (source of truth):
```bash
git fetch --prune origin
gt mq list <rig>
```

If queue is empty, skip directly to burn-or-loop.

For each queued MR, verify remote branch exists:
```bash
git branch -r | grep <branch>
```

If branch is missing:
```bash
bd close <mr-id> --reason "Branch no longer exists"
```

Track verified MRs for this cycle.
"""

[[steps]]
id = "process-branch"
title = "Mechanical rebase"
needs = ["queue-scan"]
description = """
Pick next verified MR.

Config:
- integration_branch_refinery_enabled={{integration_branch_refinery_enabled}}
- target_branch={{target_branch}}

Resolve `<rebase-target>` using Target Resolution Rule.

Attempt rebase:
```bash
git checkout -B temp origin/<polecat-branch>
git rebase origin/<rebase-target>
```

If rebase succeeds, continue to run-tests.

If rebase conflicts:
1. Abort conflict state:
```bash
git rebase --abort
```
2. Record target and branch SHAs:
```bash
TARGET_SHA=$(git rev-parse origin/<rebase-target>)
BRANCH_SHA=$(git rev-parse origin/<polecat-branch>)
```
3. Create conflict-resolution task:
```bash
bd create --type=task --priority=1 \
  --title="Resolve merge conflicts: <original-issue-title>" \
  --description="Original MR: <mr-bead-id>; Branch: <polecat-branch>; Issue: <issue-id>; Target: <rebase-target> (${TARGET_SHA}); Branch SHA: ${BRANCH_SHA}. Rebase, resolve, force-push, then close task."
```
4. Do not delete branch or close MR bead. Skip to loop-check.
"""

[[steps]]
id = "run-tests"
title = "Run quality checks and tests"
needs = ["process-branch"]
description = """
Config:
- run_tests={{run_tests}}
- setup_command={{setup_command}}
- typecheck_command={{typecheck_command}}
- lint_command={{lint_command}}
- build_command={{build_command}}
- test_command={{test_command}}

Run configured checks (skip empty commands):
```bash
{{setup_command}}
{{typecheck_command}}
{{lint_command}}
{{build_command}}
```

If run_tests = "true", run:
```bash
{{test_command}}
```

Track exactly which check/test failed for handle-failures.
"""

[[steps]]
id = "handle-failures"
title = "Handle check or test failures"
needs = ["run-tests"]
description = """
If all checks/tests pass, continue to merge-push.

If any check/test fails, diagnose branch regression vs pre-existing target failure.

If branch regression:
```bash
bd update <issue-id> --status=open --assignee=""
bd sync
gt mail send <rig>/witness -s "MERGE_FAILED <polecat-name>" -m "Branch: <branch>
Issue: <issue-id>
Polecat: <polecat-name>
Rig: <rig>
FailureType: quality-check
Error: <failure description>"
bd close <mr-bead-id> --reason "Rejected: <failure description>"
git push origin --delete <polecat-branch>
gt mail archive <merge-ready-message-id>
```
Skip to loop-check.

If pre-existing on target branch:
```bash
bd search "<failure description>" --status open --label gt:bug --limit 5
```
Create a bug only if no duplicate exists, then proceed.

Gate: do not enter merge-push unless failures are either passing or classified as pre-existing with bug/duplicate recorded.
"""

[[steps]]
id = "merge-push"
title = "Merge and push"
needs = ["handle-failures"]
description = """
Config:
- integration_branch_refinery_enabled={{integration_branch_refinery_enabled}}
- target_branch={{target_branch}}
- delete_merged_branches={{delete_merged_branches}}

Resolve `<merge-target>` using Target Resolution Rule.

Merge and push:
```bash
git checkout <merge-target>
git merge --ff-only temp
git push origin <merge-target>
```

Verify push succeeded:
```bash
git fetch origin
LOCAL_SHA=$(git rev-parse <merge-target>)
REMOTE_SHA=$(git rev-parse origin/<merge-target>)
echo "Local:  $LOCAL_SHA"
echo "Remote: $REMOTE_SHA"
```
If SHAs differ, stop and fix push before any notification or cleanup.

Send MERGED notification immediately:
```bash
gt mail send <rig>/witness -s "MERGED <polecat-name>" -m "Branch: <branch>
Issue: <issue-id>
Merged-At: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
```

Run post-merge cleanup:
```bash
gt mq post-merge <rig> <mr-bead-id>
```

`gt mq post-merge` automatically runs `make install` when the merged diff
(`HEAD@{1}..HEAD`) includes any `*.go` files.

Archive MERGE_READY message and delete temp branch:
```bash
gt mail archive <merge-ready-message-id>
git branch -d temp
```
"""

[[steps]]
id = "loop-check"
title = "Check for more work"
needs = ["merge-push"]
description = """
If more verified MR branches remain, return to process-branch.
If queue is empty, continue to burn-or-loop.

Track cycle counts for merges, conflicts, rejections, and remaining queue.
"""

[[steps]]
id = "burn-or-loop"
title = "Burn and respawn or loop"
needs = ["loop-check"]
description = """
Before deciding, run end-of-cycle inbox hygiene:
```bash
gt mail inbox
gt mail archive <stale-message-id>
```
Archive only messages already handled; keep unprocessed MERGE_READY messages.

One-line patrol summary for this cycle: merged branches, failures/conflicts, queue state.

If continuing patrol, wait for refinery events with backoff:
```bash
gt mol step await-event --channel refinery --agent-bead gt-<rig>-refinery \
  --backoff-base 30s --backoff-mult 2 --backoff-max 5m --cleanup
gt patrol report --summary "<brief summary>"
```

If handing off:
```bash
gt handoff -s "Patrol complete" -m "<brief summary + next notes>"
```

Never sleep-poll manually; always use await-event.
"""
